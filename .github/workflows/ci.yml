name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  contracts:
    name: Smart Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Build contracts
        working-directory: packages/contracts
        run: forge build

      - name: Run contract tests
        working-directory: packages/contracts
        run: forge test -vvv

  sdk:
    name: TypeScript Packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build --filter='!@smartagentkit/contracts'

      - name: Typecheck
        run: pnpm typecheck --filter='!@smartagentkit/contracts'

      - name: Test
        run: pnpm test --filter='!@smartagentkit/contracts'

      - name: Smoke-test examples (mock mode)
        run: |
          for example in defi-trading-agent-example payment-distribution-bot-example monitoring-alert-agent-example treasury-management-agent-example arbitrage-agent-example; do
            echo "=== Testing $example ==="
            timeout 60 pnpm --filter "$example" start:mock || exit 1
          done

  changeset-check:
    name: Changeset Check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check for changeset
        run: |
          # Check if any publishable package source files changed
          CHANGED=$(git diff --name-only origin/main...HEAD -- \
            packages/sdk/src packages/cli/src \
            packages/integrations/langchain/src packages/testing/src)
          if [ -n "$CHANGED" ]; then
            # Packages changed — require a changeset
            CHANGESETS=$(ls .changeset/*.md 2>/dev/null | grep -v README.md || true)
            if [ -z "$CHANGESETS" ]; then
              echo "::error::Package source files changed but no changeset found."
              echo "Run 'pnpm changeset' to create one, or add a .changeset/*.md file."
              echo ""
              echo "Changed files:"
              echo "$CHANGED"
              exit 1
            fi
            echo "Changeset found. OK."
          else
            echo "No publishable package changes detected. Changeset not required."
          fi

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs
        run: pnpm docs:build
